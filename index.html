<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARKS Wardrobe Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1121">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --void:#0d1121;
    --void-2:#161b33;
    --panel:#1a2040;
    --panel-2:#212850;
    --line:#323a68;
    --gold:#e8b84a;
    --gold-dim:#a5843a;
    --cyan:#5be3d8;
    --coral:#ff7a94;
    --text:#eae8f5;
    --text-dim:#9a9cc0;
    --good:#6fd68a;
  }
  
  *{box-sizing:border-box; touch-action: manipulation;}
  body{margin:0; font-family:'Inter', sans-serif; background: var(--void); color: var(--text);}
  
  #arks-root{
    background:
      radial-gradient(circle at 15% 0%, #262d5c 0%, transparent 45%),
      radial-gradient(circle at 90% 10%, #2c1f4a 0%, transparent 40%),
      linear-gradient(180deg, var(--void) 0%, #0a0d1a 100%);
    min-height:100vh;
    padding:28px 20px 80px;
  }
  .wrap{max-width:980px;margin:0 auto; position:relative;}

  /* original header */
  .hdr{
    display:flex;justify-content:space-between;align-items:flex-end;
    gap:16px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;margin-bottom:22px;
  }
  .hdr h1{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;
    letter-spacing:1px;margin:0 0 4px;color:var(--text);
    text-shadow:0 0 18px rgba(232,184,74,0.25);
  }
  .hdr h1 span{color:var(--gold);}
  .hdr p{margin:0;color:var(--text-dim);font-size:13px;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;text-transform:uppercase;}
  .id-tag{
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;
    color:var(--cyan);border:1px solid rgba(91,227,216,0.35);
    padding:4px 10px;border-radius:20px;letter-spacing:1px;
    background:rgba(91,227,216,0.06);
  }

  /* stats */
  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;margin-bottom:22px;
  }
  .stat{
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;
  }
  .stat .n{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:var(--cyan);}
  .stat .l{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;font-family:'Rajdhani',sans-serif;}
  .stat.owned .n{color:var(--good);}
  .stat.wishlist {border-color: rgba(232,184,74,0.3);}
  .stat.wishlist .n{color:var(--gold);}

  /* MAIN HEADER & TOOLBAR */
  #app-header {
    background: var(--panel);
    padding: 15px 20px 0 20px;
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  .top-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    margin-bottom: 20px;
  }

  .budget-box {
    background: var(--void-2);
    border: 1px solid var(--gold-dim);
    padding: 8px 15px;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    color: var(--gold);
    font-weight: 700;
  }

  .control-item {
    background: var(--void-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  
  .btn {
    background: var(--cyan);
    color: var(--void);
    border: none;
    padding: 8px 15px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    transition: filter 0.2s;
  }
  .btn:hover { filter: brightness(1.2); }

  /* --- THE BOOKMARK FOLDERS --- */
  .bookmark-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    border-bottom: 3px solid var(--cyan);
    padding: 0 5px;
  }

  .folder-tab {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    bottom: -3px; 
    transition: all 0.2s ease;
  }

  .folder-tab:hover {
    background: var(--line);
  }

  .folder-icon {
    font-size: 1.1rem;
    filter: grayscale(100%) brightness(150%) sepia(50%) hue-rotate(130deg);
    user-select: none;
  }

  .folder-tab select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    padding-right: 5px;
  }

  .folder-tab select option {
    background: var(--panel);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  }

  /* ITEM GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
    padding: 20px;
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 8px 8px;
    background: rgba(22, 27, 51, 0.4);
  }
  
  .item-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }

  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .item-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--cyan);
  }

  .item-status-icon {
    font-size: 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
  }
  
  .item-status-icon:active { transform: scale(0.8); }
  
  .item-meta { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; }
  .item-price { color: var(--gold); font-weight: 600; margin-top: 4px; }
  .item-edit { cursor: pointer; color: var(--cyan); font-size: 0.85rem; text-decoration: underline; margin-top: auto;}

  .item-img-btn {
    font-size: 11px; color: var(--gold); background: transparent; border: 1px solid rgba(232,184,74,0.3);
    padding: 3px 8px; border-radius: 4px; margin-top: 6px; display: inline-block; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .item-img-btn:hover { background: rgba(232,184,74,0.1); }
  .img-container {
    display: none; margin-top: 10px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--line); background: var(--void-2);
  }
  .img-container img { display: block; max-width: 100%; height: auto; }

  /* FAB */
  .fab{
    display:none;position:fixed;bottom:24px;right:24px;width:56px;height:56px;
    border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    color:#241705;font-size:28px;font-weight:bold;line-height:56px;text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:40;cursor:pointer;border:none;
  }
  @media(max-width:768px){ #add-btn { display:none; } .fab { display:block; } }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(13,17,33,0.85); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal {
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    width: 100%; max-width: 420px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h2 { margin: 0 0 15px 0; font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 18px;}
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 5px; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--void-2); border: 1px solid var(--line); color: var(--text);
    padding: 9px 10px; border-radius: 7px; font-size: 13.5px; font-family: 'Inter', sans-serif; outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--cyan); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  
  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); border: 1px dashed var(--line); border-radius: 12px; font-family: 'Rajdhani', sans-serif; margin: 20px;}
</style>
</head>
<body>

<div id="arks-root">
  <div class="wrap">
    
    <div class="hdr">
      <div>
        <h1>ARKS <span>WARDROBE</span> LOG</h1>

      <div class="id-tag" id="last-saved">— not saved yet —</div>

    <div class="stats" id="stats"></div>

    <div id="app-header">
      <div class="top-controls">

        <button id="add-btn" class="btn">+ Add Item</button>

        <select id="filter-status" class="control-item">

          <option value="Wishlist">Wishlist</option>
          <option value="Owned">Owned</option>

        <select id="filter-source" class="control-item">

          <option value="Farmable">Farmable</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="bookmark-bar">
        <div class="folder-tab" id="wrap-game">
          <span class="folder-icon">📁</span>
          <select id="filter-game"></select>
        </div>
        <div class="folder-tab" id="wrap-maincat" style="display:none;">
          <span class="folder-icon">📁</span>

        </div>
        <div class="folder-tab" id="wrap-subcat" style="display:none;">

          <span class="folder-icon">📁</span>
          <select id="filter-subsubcat"><option value="All">All Types</option></select>
        </div>
      </div>
    </div>

    <div class="grid" id="item-grid"></div>
    <button class="fab" id="fab-btn">+</button>
  </div>
</div>

  let items = [];

  // SAFE STORAGE SYSTEM
  async function loadData(){
    try {
      let savedStr = null;
      if (typeof window.storage !== 'undefined') {
        const res = await window.storage.get('cosmetics-data');
        savedStr = res ? res.value : null;
      } else {
        savedStr = localStorage.getItem('cosmetics-data');
      }
      
      items = savedStr ? JSON.parse(savedStr) : [];
      
      // Migration Cleanup for old data
      items.forEach(it => {
        if (!it.status) it.status = it.owned ? 'Owned' : 'Unowned';
        if (it.status === 'owned') it.status = 'Owned';
        if (it.status === 'unowned') it.status = 'Unowned';
        if (it.status === 'wishlist') it.status = 'Wishlist';
        if (!it.game) it.game = "NGS";
        if (it.mainCat === "Hair" || it.mainCat === "Hairstyle" || it.mainCat === "Hairstyles") {
            it.mainCat = "Features"; it.subCat = "Hair"; it.subSubCat = null;
        } 
        if (it.mainCat === "Clothes" && it.subCat === "CAST Parts") {
            it.mainCat = "CAST Parts"; it.subCat = it.subSubCat || "Head"; it.subSubCat = null;
        } else if (it.mainCat === "Head Parts" || it.mainCat === "Heads") {
            it.mainCat = "CAST Parts"; it.subCat = "Head"; it.subSubCat = null;
        }
      });
    } catch(e) {
      items = [];
    }

    let added = 0;
    SEED_ITEMS.forEach(seed => {
      if(!items.find(it => it.name.trim().toLowerCase() === seed.name.trim().toLowerCase() && it.subCat === seed.subCat)){
        items.push({ id: uid(), price: null, image: "", ...seed });
        added++;
      }
    });

    if(added > 0) saveData();
    
    populateFilters();
    updateFolders();
  }

  async function saveData() {
    try {
      if (typeof window.storage !== 'undefined') {
        await window.storage.set('cosmetics-data', JSON.stringify(items));
      } else {
        localStorage.setItem('cosmetics-data', JSON.stringify(items));
      }
      const savedTag = $('#last-saved');
      if (savedTag) savedTag.textContent = 'Saved · ' + new Date().toLocaleTimeString();
    } catch(e) {}
    
    calculateBudget();
    renderStats();
  }

  // --- RESTORED STATS LOGIC ---
  function renderStats() {
    const total = items.length;
    const owned = items.filter(i => i.status === 'Owned').length;
    const wishlist = items.filter(i => i.status === 'Wishlist').length;
    const pct = total ? Math.round((owned / total) * 100) : 0;
    
    const statsEl = $('#stats');
    if (statsEl) {
      statsEl.innerHTML = `
        <div class="stat"><div class="n">${total}</div><div class="l">Total Items</div></div>
        <div class="stat owned"><div class="n">${owned}</div><div class="l">Owned</div></div>
        <div class="stat wishlist"><div class="n">${wishlist}</div><div class="l">Wishlist</div></div>
        <div class="stat"><div class="n">${pct}%</div><div class="l">Complete</div></div>
      `;
    }
  }

  function calculateBudget() {
    let total = 0;
    items.forEach(item => {
      if (item.status === 'Wishlist' && item.price) total += Number(item.price);
    });
    const budgetEl = $('#budget-amount');
    if (budgetEl) budgetEl.textContent = total.toLocaleString();
  }

  // --- TOP BOOKMARK FOLDERS ---
  function populateFilters(){
    const gameFilter = $('#filter-game');
    gameFilter.innerHTML = '<option value="All">All Games</option>' + 
      Object.keys(CATEGORY_TREE).map(g => `<option value="${g}">${g}</option>`).join('');
  }

  function updateFolders() {
    const g = $('#filter-game').value;
    const mWrap = $('#wrap-maincat'); const mSel = $('#filter-maincat');
    const sWrap = $('#wrap-subcat');  const sSel = $('#filter-subcat');
    const ssWrap = $('#wrap-subsubcat'); const ssSel = $('#filter-subsubcat');

    const curM = mSel.value; const curS = sSel.value; const curSS = ssSel.value;

    mSel.innerHTML = '<option value="All">All Categories</option>';
    sSel.innerHTML = '<option value="All">All Subcategories</option>';
    ssSel.innerHTML = '<option value="All">All Types</option>';

    if (g === 'All') {
      mWrap.style.display = 'none'; sWrap.style.display = 'none'; ssWrap.style.display = 'none';
    } else {
      mWrap.style.display = 'flex';
      Object.keys(CATEGORY_TREE[g]).forEach(c => mSel.innerHTML += `<option value="${c}">${c}</option>`);
      mSel.value = Object.keys(CATEGORY_TREE[g]).includes(curM) ? curM : 'All';

      if (mSel.value === 'All') {
        sWrap.style.display = 'none'; ssWrap.style.display = 'none';
      } else {
        sWrap.style.display = 'flex';
        const subData = CATEGORY_TREE[g][mSel.value];
        
        if(Array.isArray(subData)) {
            subData.forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
            ssWrap.style.display = 'none';
        } else {
            Object.keys(subData).forEach(s => sSel.innerHTML += `<option value="${s}">${s}</option>`);
            ssWrap.style.display = 'flex';
        }
        
        sSel.value = (Array.isArray(subData) ? subData.includes(curS) : Object.keys(subData).includes(curS)) ? curS : 'All';

        if(sSel.value === 'All' || Array.isArray(subData)) {
            ssWrap.style.display = 'none';
        } else {
            const ssData = subData[sSel.value];
            if(ssData && ssData.length > 0){
                ssWrap.style.display = 'flex';
                ssData.forEach(ss => ssSel.innerHTML += `<option value="${ss}">${ss}</option>`);
                ssSel.value = ssData.includes(curSS) ? curSS : 'All';
            } else {
                ssWrap.style.display = 'none';
            }
        }
      }
    }
    updateFolderVisuals();
    renderGrid();
  }

  function updateFolderVisuals() {
    $$('.folder-tab').forEach(tab => {
      const sel = tab.querySelector('select');
      const icon = tab.querySelector('.folder-icon');
      if (sel && sel.value !== 'All') {
        icon.textContent = '📂';
        tab.style.borderColor = 'var(--cyan)';
        sel.style.color = 'var(--cyan)';
      } else {
        icon.textContent = '📁';
        tab.style.borderColor = 'var(--line)';
        sel.style.color = 'var(--text)';
      }
    });
  }

  function renderGrid() {
    const grid = $('#item-grid');
    grid.innerHTML = '';
    
    const search = $('#search').value.toLowerCase();
    const gFilter = $('#filter-game').value;
    const mFilter = $('#filter-maincat').value;
    const sFilter = $('#filter-subcat').value;
    const ssFilter = $('#filter-subsubcat').value;
    const statusFilter = $('#filter-status').value;
    const sourceFilter = $('#filter-source').value;

    const filtered = items.filter(i => {
      if(search && !i.name.toLowerCase().includes(search) && !(i.notes||'').toLowerCase().includes(search)) return false;
      if(gFilter !== 'All' && i.game !== gFilter) return false;
      if(mFilter !== 'All' && i.mainCat !== mFilter) return false;
      if(sFilter !== 'All' && i.subCat !== sFilter) return false;
      if(ssFilter !== 'All' && i.subSubCat !== ssFilter) return false;
      if(statusFilter !== 'All' && i.status !== statusFilter) return false;
      if(sourceFilter !== 'All' && i.source !== sourceFilter) return false;
      return true;
    });

    // Make sure stats are visually updated alongside the grid
    renderStats();
    calculateBudget();

    if(!filtered.length){
      grid.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">No items match this filter.<br><br>Adjust your folders or search query.</div>`;
      return;
    }

    filtered.forEach(item => {
      const el = document.createElement('div');
      el.className = 'item-card';
      
      const catLabel = `${item.game} > ${item.mainCat} > ${item.subCat}${item.subSubCat ? ' > '+item.subSubCat : ''}`;
      
      el.innerHTML = `
        <div class="item-header">
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-status-icon" data-id="${item.id}" title="Cycle Status">${statusIcons[item.status]}</div>
        </div>
        <div class="item-meta">
          <div style="color:var(--cyan); margin-bottom:4px; font-size:10px; text-transform:uppercase;">${catLabel}</div>
          <div>Source: ${item.source || 'N/A'}</div>
          ${item.price ? `<div class="item-price">${item.price.toLocaleString()} N-Meseta</div>` : ''}
          ${item.notes ? `<div style="margin-top:4px; opacity:0.8;">${escapeHtml(item.notes)}</div>` : ''}
          ${item.image ? `
            <button class="item-img-btn" data-id="${item.id}">🖼️ View Image</button>
            <div class="img-container" id="img-${item.id}">
              <img data-src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}">
            </div>
          ` : ''}
        </div>
        <div class="item-edit" data-id="${item.id}">✎ Edit Item...</div>
      `;
      grid.appendChild(el);
    });
    
    $$('.item-status-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        const id = e.target.dataset.id;
        const item = items.find(i => i.id === id);
        let idx = statuses.indexOf(item.status);
        item.status = statuses[(idx + 1) % 3];
        saveData();
        renderGrid();
      });
    });

    $$('.item-img-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.dataset.id;
        const container = document.getElementById(`img-${id}`);
        const img = container.querySelector('img');
        if (container.style.display === 'none' || container.style.display === '') {
          container.style.display = 'block';
          if (!img.src && img.dataset.src) img.src = img.dataset.src;
          btn.textContent = 'Hide Image';
        } else {
          container.style.display = 'none';
          btn.textContent = '🖼️ View Image';
        }
      });
    });

    $$('.item-edit').forEach(btn => {
      btn.addEventListener('click', (e) => openModal(items.find(i => i.id === e.target.dataset.id)));
    });
  }

        <div class="field">
          <label>Image URL (Imgur link)</label>
          <input type="text" id="f-image" value="${existing && existing.image ? escapeHtml(existing.image) : ''}" placeholder="https://i.imgur.com/...">
        </div>
        
        <div class="field">
          <label>Notes</label>
          <textarea id="f-notes" rows="2" placeholder="Optional notes...">${existing ? escapeHtml(existing.notes||'') : ''}</textarea>
        </div>
        
        <div class="field">
          <label>Item Status</label>
          <select id="f-status">
            <option value="Unowned" ${existing&&existing.status==='Unowned'?'selected':(!existing?'selected':'')}>Unowned</option>
            <option value="Wishlist" ${existing&&existing.status==='Wishlist'?'selected':''}>Wishlist</option>
            <option value="Owned" ${existing&&existing.status==='Owned'?'selected':''}>Owned</option>
          </select>
        </div>

        <div class="modal-actions">
          <button class="btn" style="background:var(--line);" id="f-cancel">Cancel</button>
          <button class="btn" style="background:var(--gold); color:#241705;" id="f-save">${existing?'Save Changes':'Add Item'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const selGame = $('#f-game');
    const selMainCat = $('#f-maincat');
    const selSubCat = $('#f-subcat');
    const selSubSubCat = $('#f-subsubcat');
    const fSubSubField = $('#f-subsubcat-field');

    Object.keys(CATEGORY_TREE).forEach(game => selGame.add(new Option(game, game)));
    if (existing && existing.game) selGame.value = existing.game;

    function updateModalCats() {
      selMainCat.innerHTML = '';
      const mainCats = Object.keys(CATEGORY_TREE[selGame.value]);
      mainCats.forEach(cat => selMainCat.add(new Option(cat, cat)));
      if (existing && existing.mainCat && mainCats.includes(existing.mainCat)) selMainCat.value = existing.mainCat;
      updateModalSubCats();
    }

    function updateModalSubCats() {
      selSubCat.innerHTML = '';
      const subCatsObj = CATEGORY_TREE[selGame.value][selMainCat.value];
      const isArr = Array.isArray(subCatsObj);
      const subCats = isArr ? subCatsObj : Object.keys(subCatsObj);
      
      subCats.forEach(sub => selSubCat.add(new Option(sub, sub)));
      if (existing && existing.subCat && subCats.includes(existing.subCat)) selSubCat.value = existing.subCat;
      updateModalSubSubCats();
    }

    function updateModalSubSubCats() {
      selSubSubCat.innerHTML = '';
      const subCatsObj = CATEGORY_TREE[selGame.value][selMainCat.value];
      
      if (!Array.isArray(subCatsObj)) {
        const subSubList = subCatsObj[selSubCat.value];
        if (subSubList && subSubList.length > 0) {
          fSubSubField.style.display = 'block';
          subSubList.forEach(item => selSubSubCat.add(new Option(item, item)));
          if (existing && existing.subSubCat && subSubList.includes(existing.subSubCat)) selSubSubCat.value = existing.subSubCat;
          return;
        }
      }
      fSubSubField.style.display = 'none';
      selSubSubCat.value = '';
    }

    selGame.addEventListener('change', updateModalCats);
    selMainCat.addEventListener('change', updateModalSubCats);
    selSubCat.addEventListener('change', updateModalSubSubCats);
    updateModalCats();

    $('#f-cancel').addEventListener('click', () => overlay.remove());
    $('#f-save').addEventListener('click', () => {
      const name = $('#f-name').value.trim();
      if(!name) return;

      const data = {
        name,
        game: selGame.value,
        mainCat: selMainCat.value,
        subCat: selSubCat.value,
        subSubCat: fSubSubField.style.display !== 'none' ? selSubSubCat.value : null,
        source: $('#f-source').value,
        price: $('#f-price').value === '' ? null : Number($('#f-price').value),
        image: $('#f-image').value.trim(),
        notes: $('#f-notes').value.trim(),
        status: $('#f-status').value
      };

      if(existing) {
        Object.assign(existing, data);
      } else {
        items.push({ id: uid(), ...data });
      }
      saveData();
      renderGrid();
      overlay.remove();
    });
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Event Listeners
  $('#filter-game').addEventListener('change', () => { $('#filter-maincat').value='All'; updateFolders(); });
  $('#filter-maincat').addEventListener('change', () => { $('#filter-subcat').value='All'; updateFolders(); });
  $('#filter-subcat').addEventListener('change', () => { $('#filter-subsubcat').value='All'; updateFolders(); });
  $('#filter-subsubcat').addEventListener('change', updateFolders);
  
  $('#search').addEventListener('input', renderGrid);
  $('#filter-status').addEventListener('change', renderGrid);
  $('#filter-source').addEventListener('change', renderGrid);
  
  $('#add-btn').addEventListener('click', () => openModal());
  
  const fab = $('#fab-btn');
  if(fab) fab.addEventListener('click', () => openModal());

  // Init
  loadData();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
